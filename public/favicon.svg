  <circle cx="28" cy="20.5" r="1.5" fill="white" opacity="0.9"/>
  <!-- Diploma scroll body -->
  <rect x="10" y="18.5" width="12" height="7" rx="1.5" fill="white" opacity="0.9"/>
  <line x1="12" y1="21" x2="20" y2="21" stroke="#7c5cff" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="23" x2="18" y2="23" stroke="#7c5cff" stroke-width="1" stroke-linecap="round"/>
